{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Grievance System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { 'brand-blue': '#1e3a8a' } } } }
    </script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-sm">
    <div class="text-center mb-8">
        <img src="{% static 'server/img/emblem.png' %}" alt="Emblem" class="h-16 w-16 mx-auto mb-3 object-contain">
        <h1 class="text-xl font-bold text-brand-blue">Digital Grievance System</h1>
        <p class="text-sm text-gray-500">Admin Panel Login</p>
    </div>

    <div class="bg-white rounded-2xl shadow-lg p-8">
        {% if messages %}
        {% for m in messages %}
        <div class="mb-4 text-sm text-red-700 bg-red-50 border border-red-200 rounded-lg px-4 py-3">{{ m }}</div>
        {% endfor %}
        {% endif %}

        <form method="post" action="{% url 'admin_panel:login' %}">
            {% csrf_token %}
            <div class="mb-5">
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">Email Address</label>
                <input type="email" name="email" required placeholder="admin@example.com"
                       class="w-full border border-gray-300 rounded-lg px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-blue/30 focus:border-brand-blue">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">Password</label>
                <input type="password" name="password" required placeholder="••••••••"
                       class="w-full border border-gray-300 rounded-lg px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-blue/30 focus:border-brand-blue">
            </div>
            <button type="submit"
                    class="w-full bg-brand-blue text-white py-2.5 rounded-lg font-semibold text-sm hover:bg-blue-900 transition-colors">
                Sign In
            </button>
        </form>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">
        © 2026 Ministry of Home Affairs, Government of Nepal
    </p>
</div>
</body>
</html>
