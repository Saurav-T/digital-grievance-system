{% extends "client/base.html" %}
{% load static %}

{% block title %}Issue Grievance | Digital Grievance and Notice Board System{% endblock %}

{% block content %}
<div class="px-6 pt-3 pb-4">
    <nav class="text-sm mb-3">
        <a href="#" class="text-brand-blue underline underline-offset-2">Grievances</a>
    </nav>

    <div class="flex gap-3">
        <button class="bg-brand-blue text-white text-sm font-semibold px-5 py-2 rounded-md shadow hover:bg-brand-blue-dark transition">
            Issue Grievance
        </button>
        <button class="bg-gray-205 text-gray-800 text-sm font-semibold px-5 py-2 rounded-md shadow hover:bg-gray-300 transition">
            Track Grievances
        </button>
    </div>
</div>

<div class="flex justify-center items-center min-h-screen px-4">
    <div class="bg-white w-full max-w-xl rounded-lg shadow-md border border-gray-200 p-8">
        <h1 class="text-center text-xl font-bold text-gray-800 mb-8">Grievance Form</h1>

        <form method="post" action="{% url 'grievance_create' %}" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- Category -->
            <div class="grid grid-cols-3 items-center gap-4 mb-4">
                <label for="category" class="col-span-1 text-sm font-semibold text-gray-800">Category</label>
                <select id="category" name="category"
                        class="col-span-2 bg-gray-100 border border-gray-300 rounded-md px-3 py-2 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-brand-blue">
                    <option value="infrastructure" selected>Infrastructure</option>
                    <option value="sanitation">Sanitation</option>
                    <option value="safety">Safety</option>
                    <option value="noise">Noise</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <!-- Subject -->
            <div class="grid grid-cols-3 items-center gap-4 mb-4">
                <label for="subject" class="col-span-1 text-sm font-semibold text-gray-800">Subject</label>
                <input type="text" id="subject" name="subject"
                       class="col-span-2 bg-gray-100 border border-gray-300 rounded-md px-3 py-2 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-brand-blue" />
            </div>

            <!-- Description -->
            <div class="mb-4">
                <label for="description" class="block text-sm font-semibold text-gray-800 mb-2">Description</label>
                <textarea id="description" name="description" rows="6"
                          class="w-full bg-gray-100 border border-gray-300 rounded-md px-3 py-2 text-sm text-gray-700 resize-y focus:outline-none focus:ring-2 focus:ring-brand-blue"></textarea>
            </div>

            <!-- Priority -->
            <div class="mb-4">
                <label class="block text-sm font-semibold text-gray-800 mb-2">Priority</label>
                <div class="flex flex-col gap-2 pl-1">
                    <label class="inline-flex items-center gap-2 text-sm text-gray-700">
                        <input type="radio" name="priority" value="low" checked class="accent-brand-blue w-3.5 h-3.5">
                        Low
                    </label>
                    <label class="inline-flex items-center gap-2 text-sm text-gray-700">
                        <input type="radio" name="priority" value="medium" class="accent-brand-blue w-3.5 h-3.5">
                        Medium
                    </label>
                    <label class="inline-flex items-center gap-2 text-sm text-gray-700">
                        <input type="radio" name="priority" value="high" class="accent-brand-blue w-3.5 h-3.5">
                        High
                    </label>
                </div>
            </div>

            <!-- Location -->
            <div class="mb-4">
                <label for="location" class="block text-sm font-semibold text-gray-800 mb-2">Location</label>
                <input type="text" id="location" name="location"
                       class="w-full bg-gray-100 border border-gray-300 rounded-md px-3 py-2 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-brand-blue" />
            </div>

            <!-- Attachments -->
            <div class="mb-8">
                <label class="block text-sm font-semibold text-gray-800 mb-2">Attachments</label>
                <label for="attachment"
                       class="flex items-center justify-center h-16 w-full bg-gray-100 border border-gray-300 rounded-md text-xs text-gray-600 cursor-pointer hover:bg-gray-200 transition">
                    <span id="attachment-label">Attach an image</span>
                    <input type="file" id="attachment" name="attachment" accept="image/*" class="hidden">
                </label>
            </div>

            <!-- Submit -->
            <div class="flex justify-center">
                <button type="submit"
                        class="bg-brand-blue text-white text-sm font-semibold px-10 py-2.5 rounded-md shadow hover:bg-brand-blue-dark transition">
                    Submit
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.getElementById('attachment').addEventListener('change', function () {
        const label = document.getElementById('attachment-label');
        label.textContent = this.files.length ? this.files[0].name : 'Attach an image';
    });
</script>
{% endblock %}
