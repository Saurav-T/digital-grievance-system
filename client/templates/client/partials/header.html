{% load static %}
<header class="relative z-30">
  <!-- ── Top bar ──────────────────────────────────────────────── -->
  <div class="bg-white shadow-sm">
    <div
      class="max-w-7xl mx-auto px-4 py-3 sm:py-4 flex items-center justify-between gap-4"
    >
      <!-- Logo + title -->
      <div class="flex items-center gap-3 min-w-0">
        <img
          src="{% static 'client/img/emblem.png' %}"
          alt="Emblem"
          class="h-10 w-10 sm:h-12 sm:w-12 object-contain flex-shrink-0"
        />
        <div class="leading-tight min-w-0">
          <p class="text-xs text-gray-500 hidden sm:block">
            Government Of Nepal
          </p>
          <p class="text-xs text-gray-500 hidden sm:block">
            Ministry of Home Affairs
          </p>
          <p class="text-sm sm:text-base font-bold text-brand-blue truncate">
            Digital Grievance and Notice Board System
          </p>
        </div>
      </div>

      <!-- Right controls -->
      <div class="flex items-center gap-0.5 sm:gap-1">
        <!-- Notification bell -->
        <div class="relative" id="notif-container">
          <button
            id="notif-toggle"
            type="button"
            aria-label="Notifications"
            class="relative p-2 rounded-full text-gray-600 hover:bg-gray-100 transition-colors focus:outline-none"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-6 w-6"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"
              />
            </svg>
            <span
              id="notif-badge"
              class="hidden absolute -top-0.5 -right-0.5 bg-red-500 text-white text-[10px] font-bold rounded-full min-w-[18px] h-[18px] flex items-center justify-center px-1 leading-none pointer-events-none"
              >0</span
            >
          </button>

          <div
            id="notif-dropdown"
            class="hidden absolute right-0 mt-2 w-80 sm:w-96 bg-white border border-gray-200 rounded-xl shadow-2xl z-50 overflow-hidden"
          >
            <div class="flex items-center justify-between px-4 py-3 border-b">
              <span class="font-semibold text-gray-900 text-sm"
                >Notifications</span
              >
              <button
                id="notif-mark-all"
                type="button"
                class="text-xs text-brand-blue hover:underline font-medium"
              >
                Mark all as read
              </button>
            </div>
            <div
              class="px-4 py-2 border-b bg-gray-50 flex flex-wrap gap-x-4 gap-y-1.5"
            >
              <label
                class="flex items-center gap-1.5 text-xs cursor-pointer select-none font-medium"
              >
                <input
                  type="checkbox"
                  id="nf-all"
                  class="accent-brand-blue"
                  checked
                />
                All
              </label>
              <label
                class="flex items-center gap-1.5 text-xs cursor-pointer select-none text-gray-600"
              >
                <input
                  type="checkbox"
                  id="nf-grievance"
                  class="accent-brand-blue"
                />
                Grievances
              </label>
              <label
                class="flex items-center gap-1.5 text-xs cursor-pointer select-none text-gray-600"
              >
                <input type="checkbox" id="nf-job" class="accent-brand-blue" />
                Job Listings
              </label>
              <label
                class="flex items-center gap-1.5 text-xs cursor-pointer select-none text-gray-600"
              >
                <input
                  type="checkbox"
                  id="nf-notice"
                  class="accent-brand-blue"
                />
                Notices
              </label>
            </div>
            <div
              id="notif-list"
              class="max-h-72 overflow-y-auto divide-y divide-gray-100"
            ></div>
            <div class="px-4 py-2.5 border-t text-center">
              <a
                href="{% url 'notifications' %}"
                class="text-xs text-brand-blue hover:underline font-medium"
              >
                View all notifications
              </a>
            </div>
          </div>
        </div>

        <!-- Profile icon -->
        <a
          href="{% url 'profile' %}"
          aria-label="My Profile"
          class="p-2 rounded-full text-gray-600 hover:bg-gray-100 transition-colors"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
            />
          </svg>
        </a>

        <!-- Hamburger / close -->
        <button
          id="sidebar-toggle"
          type="button"
          aria-label="Open menu"
          class="p-2 rounded-full text-gray-600 hover:bg-gray-100 transition-colors focus:outline-none focus:ring-2 focus:ring-brand-blue"
        >
          <span id="icon-hamburger">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-6 w-6"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M4 6h16M4 12h16M4 18h16"
              />
            </svg>
          </span>
          <span id="icon-close" class="hidden">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-6 w-6"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M6 18L18 6M6 6l12 12"
              />
            </svg>
          </span>
        </button>
      </div>
    </div>
  </div>

  {% if request.resolver_match.url_name != "login" %}
  <!-- ── Marquee notice strip ─────────────────────────────────── -->
  <div class="bg-brand-blue text-white text-sm overflow-hidden">
    <div class="max-w-7xl mx-auto flex items-center">
      <span
        class="bg-brand-blue-dark px-3 py-2 font-semibold shrink-0 whitespace-nowrap border-r border-white/20"
      >
        Notice
      </span>
      <div class="marquee-wrapper flex-1 overflow-hidden py-2">
        <div
          class="marquee-track flex gap-12 whitespace-nowrap"
          id="marquee-track"
        ></div>
      </div>
    </div>
  </div>
  {% endif %}
</header>

<script>
  (function () {
    /* ── Notification system ─────────────────────────────────────── */
    var READ_STORAGE_KEY = "dgnbs_notif_read";
    var DEMO = [
      {
        id: 1,
        type: "notice",
        title: "New Notice Published",
        body: "नवीकरण तथा बेरूजु रकम दाखिला गर्ने सम्बन्धी सूचना",
        ts: Date.now() - 7200000,
        read: false,
        url: "/notices/1/",
      },
      {
        id: 2,
        type: "grievance",
        title: "Grievance #042 Resolved",
        body: "Your grievance about Road Blockage has been resolved.",
        ts: Date.now() - 18000000,
        read: false,
        url: "#",
      },
      {
        id: 3,
        type: "job",
        title: "New Job Listing Available",
        body: "Computer Operator – Ministry of Education. Deadline: 30 July 2026.",
        ts: Date.now() - 86400000,
        read: false,
        url: "/jobs/1/",
      },
      {
        id: 4,
        type: "notice",
        title: "Public Holiday Announcement",
        body: "Government offices closed Tuesday 7 July 2026.",
        ts: Date.now() - 172800000,
        read: true,
        url: "/notices/4/",
      },
      {
        id: 5,
        type: "grievance",
        title: "Grievance #039 Under Review",
        body: "Your grievance is now being reviewed by the authority.",
        ts: Date.now() - 259200000,
        read: true,
        url: "#",
      },
      {
        id: 6,
        type: "job",
        title: "New Job Listing Available",
        body: "Data Entry Operator – Ministry of Home Affairs. Deadline: 15 Aug.",
        ts: Date.now() - 345600000,
        read: true,
        url: "/jobs/2/",
      },
    ];
    var CFG = {
      notice: {
        lbl: "Notice",
        bg: "bg-blue-50",
        tx: "text-blue-700",
        ic: "🔔",
      },
      grievance: {
        lbl: "Grievance",
        bg: "bg-orange-50",
        tx: "text-orange-700",
        ic: "📝",
      },
      job: { lbl: "Job", bg: "bg-green-50", tx: "text-green-700", ic: "💼" },
    };
    var notifs = DEMO,
      filters = new Set();

    /* Read-state is shared with the full notifications page via localStorage,
     so items marked read/unread stay in sync in both places. */
    function getReadIds() {
      try {
        return new Set(
          JSON.parse(localStorage.getItem(READ_STORAGE_KEY) || "[]"),
        );
      } catch (e) {
        return new Set();
      }
    }
    function saveReadIds(set) {
      try {
        localStorage.setItem(READ_STORAGE_KEY, JSON.stringify([...set]));
      } catch (e) {}
    }
    function isRead(n) {
      return n.read || getReadIds().has(n.id);
    }

    function ago(ts) {
      var s = Math.floor((Date.now() - ts) / 1000);
      if (s < 60) return "just now";
      if (s < 3600) return Math.floor(s / 60) + "m ago";
      if (s < 86400) return Math.floor(s / 3600) + "h ago";
      return Math.floor(s / 86400) + "d ago";
    }
    function filtered() {
      return !filters.size
        ? notifs
        : notifs.filter(function (n) {
            return filters.has(n.type);
          });
    }
    function unread() {
      return notifs.filter(function (n) {
        return !isRead(n);
      }).length;
    }
    function badge() {
      var b = document.getElementById("notif-badge");
      if (!b) return;
      var c = unread();
      if (!c) {
        b.classList.add("hidden");
        return;
      }
      b.classList.remove("hidden");
      b.textContent = c > 9 ? "9+" : c;
    }
    function render() {
      var lst = document.getElementById("notif-list");
      if (!lst) return;
      var items = filtered();
      if (!items.length) {
        lst.innerHTML =
          '<p class="text-center text-xs text-gray-400 py-8">No notifications.</p>';
        return;
      }
      lst.innerHTML = items
        .map(function (n) {
          var c = CFG[n.type] || CFG.notice;
          var read = isRead(n);
          return (
            '<a href="' +
            n.url +
            '" data-id="' +
            n.id +
            '"' +
            ' class="notif-item flex gap-3 px-4 py-3 hover:bg-gray-50 transition-colors' +
            (read ? " opacity-60" : "") +
            '">' +
            '<div class="flex-shrink-0 w-9 h-9 rounded-full ' +
            c.bg +
            ' flex items-center justify-center text-base leading-none">' +
            c.ic +
            "</div>" +
            '<div class="flex-1 min-w-0">' +
            '<div class="flex items-start justify-between gap-1">' +
            '<p class="text-xs font-semibold text-gray-900 leading-tight">' +
            n.title +
            "</p>" +
            (!read
              ? '<span class="w-2 h-2 rounded-full bg-brand-blue mt-0.5 flex-shrink-0"></span>'
              : "") +
            "</div>" +
            '<p class="text-xs text-gray-500 mt-0.5 line-clamp-2">' +
            n.body +
            "</p>" +
            '<div class="flex items-center gap-2 mt-1">' +
            '<span class="text-[10px] font-medium ' +
            c.tx +
            " " +
            c.bg +
            ' px-1.5 py-0.5 rounded">' +
            c.lbl +
            "</span>" +
            '<span class="text-[10px] text-gray-400">' +
            ago(n.ts) +
            "</span>" +
            "</div>" +
            "</div></a>"
          );
        })
        .join("");
      lst.querySelectorAll(".notif-item").forEach(function (el) {
        el.addEventListener("click", function (e) {
          e.preventDefault();
          var id = parseInt(this.dataset.id),
            href = this.getAttribute("href");
          var n = notifs.find(function (x) {
            return x.id === id;
          });
          if (n && !isRead(n)) {
            n.read = true;
            var ids = getReadIds();
            ids.add(id);
            saveReadIds(ids);
            render();
            badge();
          }
          if (href && href != "#")
            setTimeout(function () {
              window.location.href = href;
            }, 80);
        });
      });
    }

    document.addEventListener("DOMContentLoaded", function () {
      badge();
      render();
      var tog = document.getElementById("notif-toggle");
      var drp = document.getElementById("notif-dropdown");
      var cnt = document.getElementById("notif-container");
      if (tog)
        tog.addEventListener("click", function (e) {
          e.stopPropagation();
          drp.classList.toggle("hidden");
        });
      document.addEventListener("click", function (e) {
        if (cnt && !cnt.contains(e.target)) drp.classList.add("hidden");
      });
      var ma = document.getElementById("notif-mark-all");
      if (ma)
        ma.addEventListener("click", function () {
          var ids = getReadIds();
          notifs.forEach(function (n) {
            n.read = true;
            ids.add(n.id);
          });
          saveReadIds(ids);
          render();
          badge();
        });
      ["grievance", "job", "notice"].forEach(function (t) {
        var cb = document.getElementById("nf-" + t);
        if (!cb) return;
        cb.addEventListener("change", function () {
          if (this.checked) {
            filters.add(t);
            var a = document.getElementById("nf-all");
            if (a) a.checked = false;
          } else {
            filters.delete(t);
            if (!filters.size) {
              var a = document.getElementById("nf-all");
              if (a) a.checked = true;
            }
          }
          render();
        });
      });
      var nfAll = document.getElementById("nf-all");
      if (nfAll)
        nfAll.addEventListener("change", function () {
          if (this.checked) {
            filters.clear();
            ["grievance", "job", "notice"].forEach(function (t) {
              var cb = document.getElementById("nf-" + t);
              if (cb) cb.checked = false;
            });
            render();
          }
        });

      /* ── Marquee — clickable {text,url} objects ────────────────
       window.MARQUEE_NOTICES is injected by base.html from view context.
       Falls back to hardcoded items if not provided.                    */
      var MN = window.MARQUEE_NOTICES || [
        {
          text: "New Notice: नवीकरण तथा बेरूजु रकम दाखिला",
          url: "/notices/1/",
        },
        { text: "Job Opening: Computer Operator", url: "/jobs/1/" },
        {
          text: "Public Holiday Announcement – 7 July 2026",
          url: "/notices/4/",
        },
        { text: "नवीकरण तथा पदस्थापन सम्बन्धी सूचना", url: "/notices/2/" },
      ];
      var trk = document.getElementById("marquee-track");
      if (trk) {
        var dbl = MN.concat(MN);
        trk.innerHTML = dbl
          .map(function (item) {
            var text = typeof item === "string" ? item : item.text || "";
            var url = typeof item === "object" && item.url ? item.url : null;
            var dot =
              '<span class="h-1.5 w-1.5 rounded-full bg-white/60 inline-block flex-shrink-0"></span>';
            var inner = dot + "<span>" + text + "</span>";
            if (url) {
              return (
                '<a href="' +
                url +
                '" class="flex items-center gap-2 hover:text-blue-200 transition-colors underline-offset-2 hover:underline">' +
                inner +
                "</a>"
              );
            }
            return '<span class="flex items-center gap-2">' + inner + "</span>";
          })
          .join("");
      }
    });
  })();
</script>
