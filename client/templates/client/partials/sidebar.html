{% load static %}
<aside
  id="sidebar"
  class="fixed top-0 right-0 h-full w-72 max-w-[85%] bg-brand-blue text-white z-50
         transform translate-x-full transition-transform duration-300 ease-in-out
         shadow-2xl flex flex-col overflow-hidden"
>
  <!-- Top: close button (fixed, never scrolls) -->
  <div class="flex justify-end p-4 flex-shrink-0">
    <button
      id="sidebar-close"
      type="button"
      aria-label="Close menu"
      class="rounded-lg p-2 hover:bg-white/10 transition-colors">

      <svg xmlns="http://www.w3.org/2000/svg"
           class="h-6 w-6"
           fill="none"
           viewBox="0 0 24 24"
           stroke="currentColor"
           stroke-width="2">
        <path stroke-linecap="round"
              stroke-linejoin="round"
              d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <!-- spacer so the nav starts below the fixed header's hamburger button -->
  <div class="h-16 sm:h-20 flex-shrink-0"></div>

  <!-- Middle: nav (scrolls independently when it overflows available height) -->
  <nav class="px-6 flex-1 min-h-0 overflow-y-auto sidebar-nav">
    <ul class="space-y-0.5 text-sm">
      <li>
        <a href="{% url 'home' %}"
           class="flex items-center gap-2.5 px-1 py-3 border-b border-white/20
                  font-semibold hover:text-blue-200 transition-colors">
          <svg class="h-4 w-4 flex-shrink-0 opacity-80" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l9-9 9 9M4 10v10a1 1 0 001 1h4a1 1 0 001-1v-6h4v6a1 1 0 001 1h4a1 1 0 001-1V10"/>
          </svg>
          Home
        </a>
      </li>
      <li>
        <a href="{% url 'notices' %}"
           class="flex items-center gap-2.5 px-1 py-3 border-b border-white/20
                  font-semibold hover:text-blue-200 transition-colors">
          <svg class="h-4 w-4 flex-shrink-0 opacity-80" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
          </svg>
          Notices
        </a>
      </li>
      <li>
        <a href="{% url 'grievances' %}"
           class="flex items-center gap-2.5 px-1 py-3 border-b border-white/20
                  font-semibold hover:text-blue-200 transition-colors">
          <svg class="h-4 w-4 flex-shrink-0 opacity-80" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
          Grievances
        </a>
      </li>
      <li>
        <a href="{% url 'job_listings' %}"
           class="flex items-center gap-2.5 px-1 py-3 border-b border-white/20
                  font-semibold hover:text-blue-200 transition-colors">
          <svg class="h-4 w-4 flex-shrink-0 opacity-80" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m-4 6h16v8a2 2 0 01-2 2H6a2 2 0 01-2-2v-8z"/>
          </svg>
          Job Listings
        </a>
      </li>
      <li>
        <a href="{% url 'about' %}"
           class="flex items-center gap-2.5 px-1 py-3 border-b border-white/20
                  font-semibold hover:text-blue-200 transition-colors">
          <svg class="h-4 w-4 flex-shrink-0 opacity-80" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          About Us
        </a>
      </li>
    </ul>
  </nav>

  <!-- Bottom: login/logout + branding (fixed, never scrolls) -->
  <div class="px-6 pb-8 mt-4 flex-shrink-0">
    {% if request.user.is_authenticated %}
    <a href="{% url 'profile' %}"
       class="block w-full text-center bg-white text-brand-blue font-semibold rounded-lg
              py-2.5 mb-3 hover:bg-blue-100 transition-colors">
      My Profile
    </a>
    <a href="{% url 'client_logout' %}"
       class="block w-full text-center bg-white/10 text-white font-semibold rounded-lg
              py-2.5 mb-5 hover:bg-white/20 transition-colors">
      Logout
    </a>
    {% else %}
    <a href="{% url 'login' %}"
       class="block w-full text-center bg-white text-brand-blue font-semibold rounded-lg
              py-2.5 mb-5 hover:bg-blue-100 transition-colors">
      Login
    </a>
    {% endif %}
    <div class="flex items-center gap-3">
      <img src="{% static 'client/img/emblem.png' %}" alt="Emblem"
           class="h-9 w-9 object-contain flex-shrink-0">
      <div class="text-xs text-blue-100 leading-tight">
        <p>Government Of Nepal</p>
        <p>Ministry of Home Affairs</p>
        <p class="font-semibold text-white">Digital Grievance System</p>
      </div>
    </div>
  </div>
</aside>

<style>
  /* Thin, unobtrusive scrollbar for the sidebar nav only */
  .sidebar-nav {
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.25) transparent;
  }
  .sidebar-nav::-webkit-scrollbar {
    width: 6px;
  }
  .sidebar-nav::-webkit-scrollbar-track {
    background: transparent;
  }
  .sidebar-nav::-webkit-scrollbar-thumb {
    background-color: rgba(255,255,255,0.25);
    border-radius: 3px;
  }
  .sidebar-nav::-webkit-scrollbar-thumb:hover {
    background-color: rgba(255,255,255,0.4);
  }
</style>
