{% load static %}
<aside
  id="sidebar"
  class="fixed top-0 right-0 h-full w-72 max-w-[85%] bg-brand-blue text-white z-50 transform translate-x-full transition-transform duration-300 ease-in-out shadow-2xl flex flex-col"
>
  <div class="flex justify-end p-4">
    <button
        id="sidebar-close"
        type="button"
        aria-label="Close menu"
        class="rounded-lg p-2 hover:bg-white/10 transition-colors">

        <svg xmlns="http://www.w3.org/2000/svg"
             class="h-6 w-6"
             fill="none"
             viewBox="0 0 24 24"
             stroke="currentColor"
             stroke-width="2">
            <path stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M6 18L18 6M6 6l12 12"/>
        </svg>
    </button>
</div>

  <!-- spacer so the nav starts below the fixed header's hamburger button -->
  <div class="h-20 sm:h-24 flex-shrink-0"></div>

  <nav class="px-6 flex-grow overflow-y-auto">
    <ul class="space-y-1">
      <li>
        <a
          href="{% url 'home' %}"
          class="block py-3 border-b border-white/20 font-semibold hover:text-blue-200"
          >Home</a
        >
      </li>
      <li>
        <a
          href="{% url 'notices' %}"
          class="block py-3 border-b border-white/20 font-semibold hover:text-blue-200"
          >Notices</a
        >
      </li>
      <li>
        <a
          href="{% url 'grievances' %}"
          class="block py-3 border-b border-white/20 font-semibold hover:text-blue-200"
          >Grievances</a
        >
      </li>
      <li>
        <a
          href="{% url 'job_listings' %}"
          class="block py-3 border-b border-white/20 font-semibold hover:text-blue-200"
          >Job Listings</a
        >
      </li>
      <li>
        <a
          href="{% url 'about' %}"
          class="block py-3 border-b border-white/20 font-semibold hover:text-blue-200"
          >About Us</a
        >
      </li>
    </ul>
  </nav>

  <div class="px-6 pb-8">
    <a
      href="{% url 'login' %}"
      class="block text-center bg-white text-brand-blue font-semibold rounded py-2.5 hover:bg-blue-100 transition-colors"
    >
      Login
    </a>
  </div>
</aside>
